<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" />
    <!--
      This viewport works for phones with notches.
      It's optimized for gestures by disabling global zoom.
     -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <!--
      Preconnect to essential domains
    -->
    <link rel="preconnect" href="https://bsky.social" />
    <link rel="preconnect" href="https://go.bsky.app" />
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDAhKIy2uwTpIKfXqhyPUjyXrRMNgpsueE"
      async
      defer></script>
    <title>%WEB_TITLE%</title>

    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/static/media/InterVariable.c504db5c06caaf7cdfba.woff2"
      crossorigin />
    <link rel="stylesheet" href="/static/style.css">

    <style>
      /**
       * Minimum styles required to render splash.
       *
       * ALL OTHER STYLES BELONG IN `src/style.css`
       *
       * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
       */
      @font-face {
        font-family: 'InterVariable';
        src: url(/static/media/InterVariable.c504db5c06caaf7cdfba.woff2)
          format('woff2');
        font-weight: 300 1000;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'InterVariableItalic';
        src: url(/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2)
          format('woff2');
        font-weight: 300 1000;
        font-style: italic;
        font-display: swap;
      }

      html,
      body {
        margin: 0px;
        padding: 0px;
        font-family:
          InterVariable,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Liberation Sans',
          Helvetica,
          Arial,
          sans-serif;
        text-rendering: optimizeLegibility;
        /* Platform-specific reset */
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -ms-overflow-style: scrollbar;
        font-synthesis-weight: none;
      }
      :root {
        --text: black;
        --background: white;
        --backgroundLight: #e2e7ee;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --text: white;
          --background: black;
          --backgroundLight: #232e3e;
        }
      }
      html,
      body,
      #root {
        display: flex;
        flex: 1 0 auto;
        min-height: 100%;
        width: 100%;
      }
      html.theme--light,
      html.theme--light body,
      html.theme--light #root {
        background-color: white;
        --text: black;
        --background: white;
        --backgroundLight: #DCE2EA;
      }
      html.theme--dark,
      html.theme--dark body,
      html.theme--dark #root {
        color-scheme: dark;
        background-color: black;
        --text: white;
        --background: black;
        --backgroundLight: #232E3E;
      }
      html.theme--dim,
      html.theme--dim body,
      html.theme--dim #root {
        color-scheme: dark;
        background-color: #151D28;
        --text: white;
        --background: #151D28;
        --backgroundLight: #2C3A4E;
      }

      #splash {
        display: flex;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        align-items: center;
        justify-content: center;
      }

      #splash svg {
        position: relative;
        top: -50px;
        width: 100px;
      }

      /**
       * We need these styles to prevent shifting due to scrollbar show/hide on
       * OSs that have them enabled by default. This also handles cases where the
       * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
       * shift the content, by forcing the page to show a scrollbar.
       */
      body {
        width: 100%;
        overflow-y: scroll;
      }
    </style>
    <script>
      const theme = localStorage.getItem('ALF_THEME')
      if (theme) {
        document.documentElement.classList.add(`theme--${theme}`)
      }
    </script>
  </head>

  <body>
    <!--
      A generic no script element with a reload button and a message.
      Feel free to customize this however you'd like.
    -->
    <noscript>
      <form
        action=""
        style="
          background-color: #fff;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          z-index: 9999;
        ">
        <div
          style="
            font-size: 18px;
            font-family: Helvetica, sans-serif;
            line-height: 24px;
            margin: 10%;
            width: 80%;
          ">
          <p lang="en">
            Oh no! It looks like JavaScript is not enabled in your browser.
          </p>
          <p lang="en" style="margin: 20px 0">
            <button
              type="submit"
              style="
                background-color: #4630eb;
                border-radius: 100px;
                border: none;
                box-shadow: none;
                color: #fff;
                cursor: pointer;
                font-weight: bold;
                line-height: 20px;
                padding: 6px 16px;
              ">
              Reload
            </button>
          </p>
        </div>
      </form>
    </noscript>

    <!-- The root element for your Expo app. -->
    <div id="root">
      <div id="splash">
        <!-- PARA SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path
            fill="#006AFF"
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M6.335 4.212c2.293 1.76 4.76 5.327 5.665 7.241.906-1.914 3.372-5.482 5.665-7.241C19.319 2.942 22 1.96 22 5.086c0 .624-.35 5.244-.556 5.994-.713 2.608-3.315 3.273-5.629 2.87 4.045.704 5.074 3.035 2.852 5.366-4.22 4.426-6.066-1.111-6.54-2.53-.086-.26-.126-.382-.127-.278 0-.104-.041.018-.128.278-.473 1.419-2.318 6.956-6.539 2.53-2.222-2.331-1.193-4.662 2.852-5.366-2.314.403-4.916-.262-5.63-2.87C2.35 10.33 2 5.71 2 5.086c0-3.126 2.68-2.144 4.335-.874Z" />
        </svg>
      </div>
    </div>
  </body>
</html>
